---

- name: Deploy build-portal with Helm
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Load common vars (playbook group_vars/all.yml)
      include_vars:
        file: "{{ playbook_dir }}/group_vars/all.yml"

    - name: Load inventory variables (group_vars dir)
      include_vars:
        dir: "{{ inventory_dir }}/group_vars"
        extensions: [ "yml", "yaml" ]

    - name: Load secrets variables
      include_vars:
        file: "{{ inventory_dir }}/group_vars/secrets.yml"
  pre_tasks:
    # loads inventories/<env>/group_vars/*.yml
    - name: Load inventory variables (group_vars dir)
      include_vars:
        dir: "{{ inventory_dir }}/group_vars"
        extensions: [yml, yaml]

    # loads ansible/group_vars/all.yml
    - name: Load common vars (playbook group_vars/all.yml)
      include_vars:
        file: "{{ playbook_dir }}/group_vars/all.yml"

    # loads inventories/<env>/group_vars/secrets.yml (vaulted)
    - name: Load secrets variables
      include_vars:
        file: "{{ inventory_dir }}/group_vars/secrets.yml"

  tasks:
    - name: Test cluster access
      command: kubectl cluster-info
      changed_when: false

    - name: Deploy helm chart (local chart)
      kubernetes.core.helm:
        name: "{{ release_name }}"
        chart_ref: "{{ chart_path }}"
        release_namespace: "{{ k8s_namespace }}"
        create_namespace: true
        values: "{{ lookup('ansible.builtin.template', playbook_dir ~ '/build-portal-values.yml.j2') | from_yaml }}"
        wait: true
        atomic: true
        update_repo_cache: false
        dependency_update: false
