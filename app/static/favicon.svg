<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="steel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c7cbd1"/>
      <stop offset="1" stop-color="#9aa3ad"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f6c445"/>
      <stop offset="1" stop-color="#f0a500"/>
    </linearGradient>
  </defs>

  <!-- transparent background -->
  <rect width="512" height="512" fill="none"/>

  <!-- Base / ground -->
  <rect x="48" y="448" width="416" height="16" fill="url(#steel)" />

  <!-- Building (right) -->
  <rect x="320" y="272" width="128" height="176" rx="8" ry="8" fill="url(#steel)"/>
  <g fill="#dfe3e8">
    <rect x="336" y="296" width="40" height="28" rx="4"/>
    <rect x="384" y="296" width="40" height="28" rx="4"/>
    <rect x="336" y="336" width="40" height="28" rx="4"/>
    <rect x="384" y="336" width="40" height="28" rx="4"/>
    <rect x="336" y="376" width="40" height="28" rx="4"/>
    <rect x="384" y="376" width="40" height="28" rx="4"/>
  </g>

  <!-- Crane mast -->
  <rect x="96" y="128" width="40" height="320" fill="url(#gold)" />
  <!-- Cross bracing -->
  <g stroke="#b17800" stroke-width="10" stroke-linecap="round">
    <line x1="96" y1="176" x2="136" y2="128"/>
    <line x1="96" y1="240" x2="136" y2="192"/>
    <line x1="96" y1="304" x2="136" y2="256"/>
    <line x1="96" y1="368" x2="136" y2="320"/>
    <line x1="96" y1="432" x2="136" y2="384"/>
    <line x1="136" y1="176" x2="96" y2="128"/>
    <line x1="136" y1="240" x2="96" y2="192"/>
    <line x1="136" y1="304" x2="96" y2="256"/>
    <line x1="136" y1="368" x2="96" y2="320"/>
    <line x1="136" y1="432" x2="96" y2="384"/>
  </g>

  <!-- Jib -->
  <rect x="128" y="128" width="240" height="24" rx="6" ry="6" fill="url(#gold)" />
  <!-- Trolley -->
  <rect x="256" y="144" width="36" height="16" rx="4" fill="#cc8c00"/>

  <!-- Cable -->
  <rect x="272" y="160" width="4" height="120" fill="#6a737d"/>
  <!-- Hook -->
  <path d="M270 280 v14 c0 10 8 18 18 18 h10 v-12 h-10 c-3 0-6-3-6-6 v-14z" fill="#6a737d"/>

  <!-- Load (concrete block) -->
  <rect x="248" y="312" width="64" height="40" rx="6" fill="url(#steel)"/>
</svg>
